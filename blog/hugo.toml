baseURL = "https://mozzipotato.github.io/"
languageCode = "ko"
title = "SupSup 블로그"
theme = "PaperMod"

defaultContentLanguage = "ko"
enableRobotsTXT = true
buildDrafts = false
buildFuture = true

[params]
  env = "production"
  defaultTheme = "auto"
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true
  TocOpen = true
  description = "이것저것 잡다한 것을 내 맘대로 기록하고 있습니다."
  comments = true

  [params.homeInfoParams]
    Title = "SupSup 블로그"
    Content = "이것저것 잡다한 것을 제 맘대로 기록하고 있습니다."

  [params.supabase]
    url = "https://lquioaqqayfzrsgiaybd.supabase.co"
    anonKey = "sb_publishable_h8QHfIxmCF4b8U6myWL7Sg_5pdCGr79"

  [params.profileMode]
    enabled = false

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[outputs]
  home = ["HTML", "RSS", "JSON"]

[sitemap]
  changefreq = "weekly"
  priority = 0.5

