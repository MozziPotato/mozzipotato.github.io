name: Deploy Hugo to GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    # SEO 양산 패턴 회피: 정시 회피 + 비대칭 분 + 4시간 단위 6회/일
    - cron: '7 0 * * *'    # KST 09:07
    - cron: '23 4 * * *'   # KST 13:23
    - cron: '41 8 * * *'   # KST 17:41
    - cron: '13 12 * * *'  # KST 21:13
    - cron: '57 15 * * *'  # KST 00:57
    - cron: '34 19 * * *'  # KST 04:34
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

defaults:
  run:
    shell: bash

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.147.0
    steps:
      - name: Install Hugo CLI
        run: |
          wget -O ${{ runner.temp }}/hugo.deb https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb \
          && sudo dpkg -i ${{ runner.temp }}/hugo.deb

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Build with Hugo
        env:
          HUGO_CACHEDIR: ${{ runner.temp }}/hugo_cache
          HUGO_ENVIRONMENT: production
          TZ: Asia/Seoul
        run: |
          cd blog
          hugo \
            --gc \
            --minify \
            --baseURL "${{ steps.pages.outputs.base_url }}/"

      - name: Validate sitemap.xml
        run: |
          set -euo pipefail
          SITEMAP=blog/public/sitemap.xml
          test -f "$SITEMAP" || { echo "::error::sitemap.xml missing"; exit 1; }
          python3 -c "import xml.etree.ElementTree as ET; ET.parse('$SITEMAP')"
          LOC_COUNT=$(grep -o '<loc>' "$SITEMAP" | wc -l | tr -d ' ')
          POST_COUNT=$(find blog/content/posts -name '*.md' -not -name '_index.md' | wc -l | tr -d ' ')
          echo "sitemap <loc>: $LOC_COUNT, content posts: $POST_COUNT"
          if [ "$LOC_COUNT" -lt "$POST_COUNT" ]; then
            echo "::error::sitemap has fewer URLs ($LOC_COUNT) than posts ($POST_COUNT)"; exit 1
          fi
          if grep -oE '<loc>[^<]*/tags/[^<]+/</loc>' "$SITEMAP" >/dev/null; then
            echo "::error::individual tag (term) pages should be excluded from sitemap"; exit 1
          fi
          if grep -q '<loc>https://[^<]*/search/</loc>' "$SITEMAP"; then
            echo "::error::/search/ should be excluded from sitemap"; exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./blog/public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
